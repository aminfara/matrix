name: Security Release

# Fires immediately when Dependabot merges a PR that references a GitHub
# Security Advisory (GHSA-…). All other Dependabot dependency bumps are
# batched into the monthly scheduled release instead.
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  security-patch:
    # Only run when:
    #  1. The PR was actually merged (not just closed)
    #  2. The actor is Dependabot
    #  3. The PR body contains a GHSA reference (security advisory)
    if: |
      github.event.pull_request.merged == true &&
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.body, 'GHSA-')

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and tag
        run: 'npm version patch -m "chore: security release %s"'

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "Security patch release — see Dependabot PR #${{ github.event.pull_request.number }} for details."
