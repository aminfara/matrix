version: 2
updates:
  # Keep npm dependencies up-to-date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    ignore:
      # Pin Node type definitions: must stay aligned with the Node.js LTS version in use
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # Pin tsconfig presets: node-lts major bumps change target/lib settings significantly
      - dependency-name: '@tsconfig/*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
      prod-dependencies:
        dependency-type: production

  # Keep GitHub Actions up-to-date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - '*'
